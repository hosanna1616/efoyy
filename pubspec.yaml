name: efoy
description: Hospital patient relief app for Ethiopian public hospitals
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Backend & Database
  supabase_flutter: ^2.5.0
  dio: ^5.4.0

  # Offline Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.0.0

  # UI & Animations
  lottie: ^3.0.0
  rive: ^0.12.4
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Features
  mobile_scanner: ^5.2.3
  flutter_tts: ^4.0.2
  flutter_local_notifications: ^17.0.0
  vibration: ^1.8.4
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.2

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  confetti: ^0.7.0
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  printing: ^5.12.0
  pdf: ^3.10.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/maps/
    - assets/images/
    - assets/lottie/
